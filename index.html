<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moodern</title>
  <meta name="description" content="Moodern — a mood app.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23c4a882'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #14121a;
      --fg: #e8e4dc;
      --muted: #8a8494;
      --accent: #c4a882;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "DM Sans", system-ui, sans-serif;
      font-optical-sizing: auto;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    main {
      text-align: center;
      max-width: 20rem;
    }
    h1 {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: clamp(2.5rem, 8vw, 3.25rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      margin: 0 0 0.75rem;
      line-height: 1.1;
    }
    h1 span { color: var(--accent); }
    p {
      margin: 0;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <main>
    <h1>Mood<span>ern</span></h1>
    <p>Coming soon.</p>
  </main>
</body>
</html>
