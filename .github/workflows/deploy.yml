name: Deploy site

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Default `/` matches a custom domain at the site root (e.g. moodern.app). For default GitHub URLs
          # https://<user>.github.io/<repo>/ set repo variable SITE_BASE_PATH to /<repo>/ (slashes included).
          VITE_BASE_PATH: ${{ vars.SITE_BASE_PATH || '/' }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
